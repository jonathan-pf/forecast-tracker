<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forecast Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-adapter-date-fns/3.0.0/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #0f1117;
    color: #e0e0e0;
    padding: 2rem;
    min-height: 100vh;
  }
  h1 {
    font-size: 1.6rem;
    font-weight: 600;
    margin-bottom: 0.3rem;
    color: #fff;
  }
  .subtitle {
    color: #888;
    font-size: 0.9rem;
    margin-bottom: 2rem;
  }
  .summary-bar {
    display: flex;
    gap: 1rem;
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }
  .summary-card {
    background: #1a1d27;
    border: 1px solid #2a2d3a;
    border-radius: 10px;
    padding: 1.2rem 1.5rem;
    flex: 1;
    min-width: 250px;
  }
  .summary-card .q-label {
    font-size: 0.78rem;
    color: #888;
    margin-bottom: 0.5rem;
    line-height: 1.3;
  }
  .summary-card .estimate {
    font-size: 2rem;
    font-weight: 700;
    color: #fff;
  }
  .summary-card .ci {
    font-size: 0.82rem;
    color: #666;
    margin-top: 0.2rem;
  }
  .summary-card .change {
    font-size: 0.78rem;
    margin-top: 0.5rem;
    padding: 0.25rem 0.6rem;
    border-radius: 4px;
    display: inline-block;
  }
  .change-initial { background: #1e293b; color: #64748b; }
  .change-up { background: #14532d; color: #4ade80; }
  .change-down { background: #451a1a; color: #f87171; }
  .change-flat { background: #1e293b; color: #94a3b8; }
  .chart-container {
    background: #1a1d27;
    border: 1px solid #2a2d3a;
    border-radius: 10px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }
  .chart-container h2 {
    font-size: 0.95rem;
    font-weight: 500;
    margin-bottom: 1rem;
    color: #ccc;
  }
  .chart-wrapper {
    position: relative;
    height: 280px;
  }
  .no-trend {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 200px;
    color: #555;
    font-size: 0.9rem;
  }
  .footer {
    text-align: center;
    color: #444;
    font-size: 0.75rem;
    margin-top: 2rem;
    padding-top: 1rem;
    border-top: 1px solid #1e2130;
  }
  .color-0 { border-left: 3px solid #6366f1; }
  .color-1 { border-left: 3px solid #f59e0b; }
  .color-2 { border-left: 3px solid #10b981; }
</style>
</head>
<body>

<h1>Forecast Tracker</h1>
<p class="subtitle">Probabilistic forecasts updated daily via superforecaster methodology</p>

<div class="summary-bar" id="summary-bar"></div>
<div id="charts"></div>

<div class="footer">
  Generated by Cowork scheduled task &middot; Methodology: reference class reasoning + inside view adjustment + 80% CI
</div>

<script>
const COLORS = [
  { line: '#6366f1', fill: 'rgba(99,102,241,0.15)' },
  { line: '#f59e0b', fill: 'rgba(245,158,11,0.15)' },
  { line: '#10b981', fill: 'rgba(16,185,129,0.15)' }
];

// DATA_INJECT_START
const DATA = [
  {
    "date": "2026-03-22",
    "question": "Will AGI be developed before 1 January 2030?",
    "central": 18,
    "ci_lower": 8,
    "ci_upper": 32,
    "key_change": "Initial forecast"
  },
  {
    "date": "2026-03-22",
    "question": "Will economic consultancy lose \u226533% value/jobs by end 2030 due to AI?",
    "central": 8,
    "ci_lower": 3,
    "ci_upper": 18,
    "key_change": "Initial forecast"
  },
  {
    "date": "2026-03-22",
    "question": "Will Labour be largest party at next UK General Election?",
    "central": 28,
    "ci_lower": 15,
    "ci_upper": 45,
    "key_change": "Initial forecast"
  }
];
// DATA_INJECT_END

// Group by question, preserving insertion order
const questions = [];
const grouped = {};
DATA.forEach(d => {
  if (!grouped[d.question]) {
    grouped[d.question] = [];
    questions.push(d.question);
  }
  grouped[d.question].push(d);
});

// Summary cards
const summaryBar = document.getElementById('summary-bar');
questions.forEach((q, i) => {
  const entries = grouped[q];
  const latest = entries[entries.length - 1];
  const prev = entries.length > 1 ? entries[entries.length - 2] : null;

  let changeClass = 'change-initial';
  let changeText = latest.key_change;
  if (prev) {
    const diff = latest.central - prev.central;
    if (diff > 0) changeClass = 'change-up';
    else if (diff < 0) changeClass = 'change-down';
    else changeClass = 'change-flat';
  }

  const card = document.createElement('div');
  card.className = `summary-card color-${i}`;
  card.innerHTML = `
    <div class="q-label">${q}</div>
    <div class="estimate">${latest.central}%</div>
    <div class="ci">80% CI: ${latest.ci_lower}% &ndash; ${latest.ci_upper}%</div>
    <div class="change ${changeClass}">${changeText}</div>
  `;
  summaryBar.appendChild(card);
});

// Charts
const chartsDiv = document.getElementById('charts');
questions.forEach((q, i) => {
  const entries = grouped[q];
  const container = document.createElement('div');
  container.className = 'chart-container';
  container.innerHTML = `<h2>${q}</h2>`;

  if (entries.length < 2) {
    container.innerHTML += `<div class="no-trend">Trend chart will appear after 2+ data points. Current estimate: <strong style="color:#fff;margin-left:6px">${entries[0].central}%</strong></div>`;
  } else {
    const wrapper = document.createElement('div');
    wrapper.className = 'chart-wrapper';
    const canvas = document.createElement('canvas');
    wrapper.appendChild(canvas);
    container.appendChild(wrapper);

    const dates = entries.map(e => e.date);
    const centrals = entries.map(e => e.central);
    const lowers = entries.map(e => e.ci_lower);
    const uppers = entries.map(e => e.ci_upper);
    const changes = entries.map(e => e.key_change);

    new Chart(canvas, {
      type: 'line',
      data: {
        labels: dates,
        datasets: [
          {
            label: 'CI Upper',
            data: uppers,
            borderColor: 'transparent',
            backgroundColor: COLORS[i].fill,
            fill: '+1',
            pointRadius: 0,
            tension: 0.3
          },
          {
            label: 'CI Lower',
            data: lowers,
            borderColor: 'transparent',
            backgroundColor: 'transparent',
            fill: false,
            pointRadius: 0,
            tension: 0.3
          },
          {
            label: 'Central Estimate',
            data: centrals,
            borderColor: COLORS[i].line,
            backgroundColor: COLORS[i].line,
            borderWidth: 2.5,
            pointRadius: 4,
            pointHoverRadius: 6,
            fill: false,
            tension: 0.3
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#1a1d27',
            borderColor: '#2a2d3a',
            borderWidth: 1,
            titleColor: '#fff',
            bodyColor: '#ccc',
            callbacks: {
              afterBody: function(items) {
                const idx = items[0].dataIndex;
                return changes[idx] ? '\n' + changes[idx] : '';
              }
            }
          }
        },
        scales: {
          x: {
            type: 'category',
            grid: { color: '#1e2130' },
            ticks: { color: '#666' }
          },
          y: {
            min: 0,
            max: 100,
            grid: { color: '#1e2130' },
            ticks: {
              color: '#666',
              callback: v => v + '%'
            }
          }
        }
      }
    });
  }

  chartsDiv.appendChild(container);
});
</script>
</body>
</html>
